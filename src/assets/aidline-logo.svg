<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">AidLine logo</title>
  <desc id="desc">Stylized AidLine wordmark with a Lebanon-inspired A.</desc>
  <defs>
    <linearGradient id="aFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7dde6"/>
      <stop offset="100%" stop-color="#c7ccd5"/>
    </linearGradient>
    <clipPath id="lebanonShape">
      <path d="M64 262 L82 236 L88 208 L104 194 L110 170 L126 160 L132 142 L148 132 L152 112 L166 96 L174 76 L190 68 L198 46 L212 40 L220 56 L238 62 L250 84 L270 96 L284 124 L288 148 L300 170 L296 192 L308 214 L300 236 L278 254 L250 264 L220 284 L184 288 L150 274 L122 272 Z"/>
    </clipPath>
  </defs>

  <!-- Stylized A -->
  <g transform="translate(24,20)">
    <path fill="url(#aFill)" d="M12 246 L138 26 L220 246 H168 L140 172 H90 L62 246 Z"/>
    <path fill="#071129" d="M102 148 H132 L118 108 Z"/>
    <rect x="206" y="78" width="18" height="168" fill="#45bcc8"/>
    <g clip-path="url(#lebanonShape)" transform="translate(2,0)">
      <rect x="0" y="0" width="320" height="300" fill="#dce2ec" opacity="0.85"/>
      <path d="M0 242 L320 108" stroke="#b8c2cf" stroke-width="10" opacity="0.35"/>
      <path d="M0 200 L320 66" stroke="#b8c2cf" stroke-width="8" opacity="0.25"/>
    </g>
  </g>

  <!-- Line text -->
  <text x="338" y="228" fill="#45bcc8" font-size="214" font-family="Space Grotesk, Inter, Arial, sans-serif" font-weight="700" letter-spacing="0">Line</text>
</svg>
